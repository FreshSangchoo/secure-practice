name: Deploy to EKS

on:
  push:
    branches: [ docker-aws-practice ]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: shopeasy-api
  EKS_CLUSTER_NAME: shop-Cluster
  K8S_NAMESPACE: shopeasy
  K8S_DEPLOYMENT: shopeasy-api

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. AWS 자격 증명 (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Docker 이미지 빌드 & Push
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. kubeconfig 업데이트
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      # 6. Namespace 생성 (없으면 생성, 있으면 무시)
      - name: Create namespace
        run: |
          kubectl create namespace $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      # 7. K8s Secret 생성/업데이트 (GitHub Secrets → K8s Secret)
      - name: Create K8s Secret from GitHub Secrets
        run: |
          kubectl create secret generic shopeasy-secret \
            --namespace $K8S_NAMESPACE \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # 8. ConfigMap, Deployment, Service 적용
      - name: Apply K8s manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # ConfigMap 적용
          kubectl apply -f k8s/shopeasy-config.yaml

          # Deployment 적용 (이미지 태그를 커밋 해시로 교체)
          sed "s|ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/shopeasy-api:latest|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" \
            k8s/shopeasy-deployment.yaml | kubectl apply -f -

          # Service 적용
          kubectl apply -f k8s/shopeasy-service.yaml

      # 9. 롤아웃 완료 대기
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/$K8S_DEPLOYMENT \
            -n $K8S_NAMESPACE \
            --timeout=300s

      # 10. 배포 결과 확인
      - name: Verify deployment
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment $K8S_DEPLOYMENT -n $K8S_NAMESPACE
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n $K8S_NAMESPACE -o wide
          echo ""
          echo "=== Service Status ==="
          kubectl get svc -n $K8S_NAMESPACE
          echo ""
          echo "=== Current Image ==="
          kubectl get deployment $K8S_DEPLOYMENT -n $K8S_NAMESPACE \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""